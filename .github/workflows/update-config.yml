name: Update Russia IP config

on:
  schedule:
    - cron: "0 17 * * *"  # 00:00 по Красноярску (UTC+7)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update russia.config
        run: python scripts/update_config.py

      - name: Commit and push if changed
        run: |
          git add russia.config
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                commit -m "chore: update Russia IP ranges from opencck"
            git push
          fi
